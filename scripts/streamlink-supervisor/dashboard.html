<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Streamlink Supervisor — Health</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c24;
      --panel-border: #262c38;
      --fg: #e7eaf0;
      --muted: #8c95a8;
      --green: #2ea04a;
      --amber: #d6a015;
      --red: #d6452f;
      --gray: #565f72;
      --link: #6aa6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1100px;
      margin: 0 auto 16px;
    }
    h1 { font-size: 20px; margin: 0; font-weight: 600; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: var(--panel);
      border: 1px solid var(--panel-border);
    }
    .pill::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gray);
    }
    .pill[data-state="ok"]::before { background: var(--green); }
    .pill[data-state="degraded"]::before { background: var(--amber); }
    .pill[data-state="unreachable"]::before { background: var(--red); }
    #meta {
      max-width: 1100px;
      margin: 0 auto 16px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--panel-border);
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #14171f;
    }
    tr:last-child td { border-bottom: none; }
    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gray);
      margin-right: 8px;
      vertical-align: middle;
    }
    .dot.running { background: var(--green); }
    .dot.escalated { background: var(--red); }
    .dot.restarting { background: var(--amber); }
    .dot.stopped { background: var(--gray); }
    .restarts { font-variant-numeric: tabular-nums; }
    .restarts.alert { color: var(--red); font-weight: 600; }
    .url { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 12px; color: var(--muted); }
    .empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }
    .empty a { color: var(--link); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>OBS Streamlink Supervisor</h1>
    <div id="overall" class="pill" data-state="unknown">starting</div>
  </header>
  <div id="meta">
    <span>Last update: <span id="last-update">never</span></span>
    <span>Polling every 1 s</span>
    <span><a id="raw-link" href="/health" style="color: var(--link); text-decoration: none;">view raw /health JSON</a></span>
  </div>
  <main>
    <table id="streams">
      <thead>
        <tr>
          <th style="width: 35%">Stream</th>
          <th style="width: 20%">Status</th>
          <th style="width: 15%">Restarts</th>
          <th>OBS input URL</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="4" class="empty">Connecting to <code>/health</code>…</td></tr>
      </tbody>
    </table>
  </main>
  <script>
  (function () {
    const overallEl = document.getElementById("overall");
    const lastUpdateEl = document.getElementById("last-update");
    const rowsEl = document.getElementById("rows");
    let lastPayload = null;

    function fmtTime(d) {
      const pad = n => String(n).padStart(2, "0");
      return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
    }

    function renderUnreachable(detail) {
      overallEl.dataset.state = "unreachable";
      overallEl.textContent = "unreachable";
      rowsEl.innerHTML = '<tr><td colspan="4" class="empty">Supervisor /health not responding' +
        (detail ? ' — ' + escapeHtml(detail) : "") + '. Retrying every 1 s.</td></tr>';
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      })[c]);
    }

    function renderPayload(body) {
      const state = body.status === "ok" ? "ok" : "degraded";
      overallEl.dataset.state = state;
      overallEl.textContent = body.status;
      const streams = Array.isArray(body.streams) ? body.streams : [];
      if (streams.length === 0) {
        rowsEl.innerHTML = '<tr><td colspan="4" class="empty">No streams supervised.</td></tr>';
        return;
      }
      const rows = streams.map(s => {
        const status = String(s.status || "unknown");
        const restarts = Number(s.restartCount || 0);
        const alert = restarts >= 3 || status === "escalated" ? " alert" : "";
        return '<tr>' +
          '<td>' + escapeHtml(s.streamId) + '</td>' +
          '<td><span class="dot ' + escapeHtml(status) + '"></span>' + escapeHtml(status) + '</td>' +
          '<td class="restarts' + alert + '">' + restarts + '</td>' +
          '<td class="url">' + escapeHtml(s.obsInputUrl || "") + '</td>' +
          '</tr>';
      }).join("");
      rowsEl.innerHTML = rows;
    }

    async function poll() {
      try {
        const res = await fetch("/health", { cache: "no-store" });
        if (!res.ok) {
          renderUnreachable("HTTP " + res.status);
          return;
        }
        const body = await res.json();
        lastPayload = body;
        lastUpdateEl.textContent = fmtTime(new Date());
        renderPayload(body);
      } catch (err) {
        renderUnreachable(err && err.message ? err.message : String(err));
      }
    }

    poll();
    setInterval(poll, 1000);
  })();
  </script>
</body>
</html>
