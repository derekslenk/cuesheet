name: Lint, Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20, 22 ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Clean NextJS cache
        run: rm -rf .next

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      - name: Run tests
        # Plain jest (not test:ci) — gate on tests passing, not the 70%
        # coverageThreshold, which the app's overall coverage doesn't yet meet.
        run: npm test
        env:
          CI: 'true'

      - name: Audit sqlite.open call sites
        run: npm run audit:sqlite-opens

      - name: Build project
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-ss-${{ matrix.node-version }}
          include-hidden-files: 'true'
          path: ./.next/*